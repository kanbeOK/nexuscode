# NexusCode Workflow Configuration
# Inspired by ChatDev's YAML-based workflow system

company:
  name: "NexusCode Labs"
  description: "Multi-Agent Software Development Pipeline"

agents:
  ceo:
    name: "Visionary CEO"
    role: "Business Strategy & Stakeholder Management"
    model: "gpt-4o"
    capabilities:
      - requirement_analysis
      - priority_setting
      - stakeholder_communication
      - final_approval

  cto:
    name: "Technical CTO"
    role: "Technology Decisions & Architecture Review"
    model: "gpt-4o"
    capabilities:
      - technology_selection
      - architecture_review
      - risk_assessment
      - technical_guidance

  tech_lead:
    name: "Tech Lead"
    role: "Development Leadership & Code Quality"
    model: "gpt-4o"
    capabilities:
      - task_breakdown
      - code_review
      - mentoring
      - standards_enforcement

  planner:
    name: "Product Planner"
    role: "Requirements & User Stories"
    model: "gpt-4o"
    capabilities:
      - requirement_analysis
      - user_story_creation
      - acceptance_criteria
      - estimation

  architect:
    name: "System Architect"
    role: "System Design & Technical Specifications"
    model: "gpt-4o"
    capabilities:
      - system_design
      - api_contract
      - data_modeling
      - integration_planning

  developer:
    name: "Senior Developer"
    role: "Code Implementation"
    model: "gpt-4o"
    capabilities:
      - code_writing
      - unit_testing
      - debugging
      - optimization

  reviewer:
    name: "Code Reviewer"
    role: "Code Quality & Security Review"
    model: "gpt-4o"
    capabilities:
      - code_review
      - security_analysis
      - best_practices
      - feedback_provision

  qa:
    name: "QA Engineer"
    role: "Testing & Quality Assurance"
    model: "gpt-4o"
    capabilities:
      - test_planning
      - test_automation
      - bug_reporting
      - quality_verification

  scribe:
    name: "Technical Writer"
    role: "Documentation & Communication"
    model: "gpt-4o"
    capabilities:
      - documentation
      - api_docs
      - user_guides
      - changelog

workflow:
  name: "Software Development Lifecycle"
  description: "Complete SDLC from requirements to deployment"

  phases:
    - id: 1
      name: "Requirements Analysis"
      type: "requirements"
      agents:
        - ceo
        - planner
      goal: "Analyze business requirements and create detailed user stories"
      max_turns: 3
      outputs:
        - user_stories
        - acceptance_criteria
        - priority_list

    - id: 2
      name: "Architecture Design"
      type: "design"
      agents:
        - cto
        - architect
      goal: "Design system architecture and technical specifications"
      max_turns: 3
      outputs:
        - architecture_diagram
        - api_contracts
        - data_models
        - tech_stack

    - id: 3
      name: "Implementation"
      type: "implementation"
      agents:
        - tech_lead
        - developer
      goal: "Implement code based on architecture design"
      max_turns: 5
      outputs:
        - source_code
        - unit_tests
        - code_documentation

    - id: 4
      name: "Code Review"
      type: "review"
      agents:
        - reviewer
        - developer
      goal: "Review code quality, security, and best practices"
      max_turns: 3
      outputs:
        - review_feedback
        - approval_status
        - improvement_suggestions

    - id: 5
      name: "Testing"
      type: "testing"
      agents:
        - qa
        - developer
      goal: "Create and execute comprehensive test plans"
      max_turns: 3
      outputs:
        - test_plan
        - test_results
        - bug_reports

    - id: 6
      name: "Documentation"
      type: "documentation"
      agents:
        - scribe
        - tech_lead
      goal: "Create comprehensive project documentation"
      max_turns: 2
      outputs:
        - readme
        - api_documentation
        - user_guide
        - changelog

  transitions:
    - from: 1
      to: 2
      condition: "user_stories_approved"

    - from: 2
      to: 3
      condition: "architecture_approved"

    - from: 3
      to: 4
      condition: "code_implemented"

    - from: 4
      to: 5
      condition: "code_approved"

    - from: 5
      to: 6
      condition: "tests_passed"

  human_intervention:
    enabled: true
    points:
      - phase: 1
        action: "approve_requirements"
        description: "CEO approves business requirements"

      - phase: 2
        action: "approve_architecture"
        description: "CTO approves technical architecture"

      - phase: 4
        action: "approve_code"
        description: "Tech Lead approves code review"

      - phase: 5
        action: "approve_release"
        description: "QA Lead approves for release"

band_integration:
  enabled: true
  room_type: "project"
  mention_routing: true
  context_sharing: true
  real_time_collaboration: true

  agent_registration:
    - role: "ceo"
      band_agent_name: "NexusCode CEO"
      description: "Business strategy and stakeholder management"

    - role: "cto"
      band_agent_name: "NexusCode CTO"
      description: "Technology decisions and architecture review"

    - role: "tech_lead"
      band_agent_name: "NexusCode Tech Lead"
      description: "Development leadership and code quality"

    - role: "planner"
      band_agent_name: "NexusCode Planner"
      description: "Requirements analysis and user stories"

    - role: "architect"
      band_agent_name: "NexusCode Architect"
      description: "System design and technical specifications"

    - role: "developer"
      band_agent_name: "NexusCode Developer"
      description: "Code implementation and unit testing"

    - role: "reviewer"
      band_agent_name: "NexusCode Reviewer"
      description: "Code quality and security review"

    - role: "qa"
      band_agent_name: "NexusCode QA"
      description: "Testing and quality assurance"

    - role: "scribe"
      band_agent_name: "NexusCode Scribe"
      description: "Documentation and communication"

memory:
  enabled: true
  types:
    - task_memory
    - experience_memory
    - knowledge_base

  retention:
    task_memory: "30_days"
    experience_memory: "permanent"
    knowledge_base: "permanent"

  sharing:
    between_agents: true
    across_projects: true
    human_accessible: true

tools:
  code_execution:
    enabled: true
    sandbox: "docker"
    timeout: 300

  git_integration:
    enabled: true
    auto_commit: false
    branch_strategy: "feature"

  api_generation:
    enabled: true
    format: "openapi"
    auto_document: true

  testing:
    framework: "pytest"
    coverage_target: 90
    auto_run: true

  documentation:
    auto_generate: true
    formats:
      - markdown
      - openapi
      - pdf
