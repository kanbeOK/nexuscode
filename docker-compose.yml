version: '3.8'

services:
  nexuscore:
    build: .
    ports:
      - "8000:8000"
    environment:
      - NEXUSCODE_PROJECT_NAME=nexuscode-project
      - NEXUSCODE_LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://nexuscore:8000
    depends_on:
      - nexuscore
    restart: unless-stopped
